name: Audit gate regression

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check-audit-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install skill and prompt files
        run: |
          bash install.sh copilot-cli .
          bash install.sh copilot-ide .
          bash install.sh codex .
      - name: Verify audit gate markers (Phases 8–10)
        run: ./tests/check-audit-gates.sh
