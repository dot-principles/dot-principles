name: Audit gate regression

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check-audit-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Install skill files
        run: bash install.sh vendor .
      - name: Verify audit gate markers (Phases 8–10)
        run: ./tests/check-audit-gates.sh
