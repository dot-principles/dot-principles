# Template manifest — Claude Code thin wrapper (.claude/commands/)
# Installs a minimal slash command that delegates to .agents/skills/<slug>/SKILL.md.
# See DESIGN.md § "Template System" for schema documentation.

TOOL_ID=claude
TOOL_LABEL="Claude Code"
OUTPUT_DIR=".claude/commands"
OUTPUT_FILE="{{COMMAND_NAME}}.md"
INSTALL_SUBCOMMAND=claude

# Extra sed expressions applied to command body (pipe-separated, empty = none)
PATCHES=""
